name: GetManager
permissions:
  contents: write  # Allow writing to repository contents (for pushing tags)
  actions: read   # Allows triggering actions

on:
  workflow_call: # This allows this workflow to be called from another workflow
    inputs:
      kernelsu_variant:
        required: true
        type: string
      ksu_branch:
        required: false
        type: string
        default: Stable(标准)
      custom_ref:
        required: false
        type: string
    outputs:
      susVer:
        description: "The fetched SUSFS version number"
        value: ${{ jobs.get_ksu_manager.outputs.susVer }}

      ksuVer:
        description: "The calculated KSU version number"
        value: ${{ jobs.get_ksu_manager.outputs.ksuVer }}

jobs:
  get_ksu_manager:
    if: inputs.kernelsu_variant != 'None'
    runs-on: ubuntu-latest
    outputs:
      # 输出1: KSU版本号
      ksuVer: ${{ steps.get_version.outputs.kversion }}
      # 输出2: SUSFS版本号
      susVer: ${{ steps.get_version.outputs.sversion }}
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 🧐 Debug Workflow Caller Context
        run: |
          echo "==================== DEBUG CONTEXT ===================="
          echo " "
          echo "EVENT NAME: ${{ github.event_name }}"
          echo " "
          echo "--- CALLER INFORMATION ---"
          echo "  - Caller Repository: ${{ github.caller_repository }}"
          echo "  - Caller Workflow:   ${{ github.caller_workflow }}"
          echo "  - Caller User:       ${{ github.triggering_actor }}"
          echo " "
          echo "--- WORKFLOW & JOB INFORMATION ---"
          echo "  - Current Workflow:  ${{ github.workflow }}"
          echo "  - Current Job ID:    ${{ github.job }}"
          echo "  - Current Run ID:    ${{ github.run_id }}"
          echo "  - Current Run Number:${{ github.run_number }}"
          echo " "
          echo "--- GIT REFERENCE INFORMATION ---"
          echo "  - Git Ref:           ${{ github.ref }}"
          echo "  - Ref Type:          ${{ github.ref_type }}"
          echo " "
          echo "======================================================="
          
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl jq

      - name: 确定 KernelSU 分支
        if: inputs.ksu_variant != 'None'
        id: ksu-branch
        run: |
          variant_input="${{ inputs.kernelsu_variant }}"
          branch_input="${{ inputs.ksu_branch }}"
          custom_ref_input="${{ inputs.custom_ref }}"
          OFFICIAL_STABLE_REF="3f388ef137c78e1ca0c92c0ada3b8717cdcc4302"
          SUKISU_STABLE_REF="c5af9eadac43b1f0b9751471be78e6eef681554b"
          RESUKISU_STABLE_REF="b6706363b95525acd4007da19edadb1d41b2ea27"
          SUKISU_REPO="SukiSU-Ultra/SukiSU-Ultra"

          # Dev 固定引用先完整复制 Stable 配置，后续只改这里的 *_DEV_REF 即可。
          OFFICIAL_DEV_REF="290609c945728fc93d85735918793567588103c1"
          SUKISU_DEV_REF="aac170bcb86ce45516b3e2c0e2b32b57004b8f73"
          RESUKISU_DEV_REF="fb771414f249ab886c09f2cfcbbf91c4b4dab2d1"

          get_success_action_sha() {
            REPO="$1"
            BRANCH="$2"
            NABE="$3"
            INDEX=$((NABE - 1))
            curl -s \
              "https://api.github.com/repos/$REPO/actions/workflows/build-manager.yml/runs?status=success&branch=$BRANCH&per_page=$NABE" \
              | jq -r --argjson idx "$INDEX" '.workflow_runs[$idx].head_sha'
          }

          check_ref() {
            REPO="$1"
            if [[ "$custom_ref_input" =~ ^[A-Fa-f0-9]{40}$ ]]; then
              MSG=$(curl -s "https://api.github.com/repos/$REPO/commits/$custom_ref_input" \
                      | jq -r '.message // empty')
            elif [[ "$custom_ref_input" =~ ^[Vv]?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              MSG=$(curl -s "https://api.github.com/repos/$REPO/git/ref/tags/$custom_ref_input" \
                      | jq -r '.message // empty')
            else
              MSG=$(curl -s "https://api.github.com/repos/$REPO/branches/$custom_ref_input" \
                      | jq -r '.message // empty')
            fi
            if echo "$MSG" | grep -qi "no.*found"; then
              echo "error: '$custom_ref_input' 在 $REPO 中不存在"
              exit 1
            fi
          }

          if [ "$branch_input" = "Custom(自定义)" ]; then
            # 分支名:数字（如 main:5 → 第 5 个成功构建）
            if [[ "$custom_ref_input" =~ ^([A-Za-z0-9._/-]+):([0-9]+)$ ]]; then
              BRANCH="${BASH_REMATCH[1]}"
              NABE="${BASH_REMATCH[2]}"
              if [ "$variant_input" = "Official" ]; then
                OFFICIAL_CUSTOM_REF="$(get_success_action_sha "tiann/KernelSU" "$BRANCH" "$NABE")"
              elif [ "$variant_input" = "SukiSU" ]; then
                SUKISU_CUSTOM_REF="$(get_success_action_sha "SukiSU-Ultra/SukiSU-Ultra" "$BRANCH" "$NABE")"
              elif [ "$variant_input" = "ReSukiSU" ]; then
                RESUKISU_CUSTOM_REF="$(get_success_action_sha "ReSukiSU/ReSukiSU" "$BRANCH" "$NABE")"
              fi
            else
              if [ "$variant_input" = "Official" ]; then
                check_ref "tiann/KernelSU"
              elif [ "$variant_input" = "SukiSU" ]; then
                check_ref "$SUKISU_REPO"
              elif [ "$variant_input" = "ReSukiSU" ]; then
                check_ref "ReSukiSU/ReSukiSU"
              fi
              OFFICIAL_CUSTOM_REF="$custom_ref_input"
              SUKISU_CUSTOM_REF="$custom_ref_input"
              RESUKISU_CUSTOM_REF="$custom_ref_input"
            fi
          fi

          case "$branch_input" in
            "Stable(标准)")
              OFFICIAL_REF="$OFFICIAL_STABLE_REF"
              SUKISU_REF="$SUKISU_STABLE_REF"
              RESUKISU_REF="$RESUKISU_STABLE_REF"
              ;;
            "Dev(开发)")
              OFFICIAL_REF="$OFFICIAL_DEV_REF"
              SUKISU_REF="$SUKISU_DEV_REF"
              RESUKISU_REF="$RESUKISU_DEV_REF"
              ;;
            "Custom(自定义)")
              OFFICIAL_REF="$OFFICIAL_CUSTOM_REF"
              SUKISU_REF="$SUKISU_CUSTOM_REF"
              RESUKISU_REF="$RESUKISU_CUSTOM_REF"
              ;;
            *)
              echo "未知分支: $branch_input" >&2
              exit 1
              ;;
          esac

          case "$variant_input" in
            "Official") BRANCH="$OFFICIAL_REF" ;;
            "SukiSU") BRANCH="$SUKISU_REF" ;;
            "ReSukiSU") BRANCH="$RESUKISU_REF" ;;
            *) echo "未知变体: $variant_input" >&2; exit 1 ;;
          esac

          echo "EFFECTIVE_KSU_BRANCH=$branch_input" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          if [ "$BRANCH" == "null" ]; then
            echo "error:KernelSU分支获取失败，请检查输入"
            exit 1
          fi
          echo "KSU 分支: $branch_input -> $BRANCH"

      - name: 获取 KSU & SUSFS 版本
        id: get_version
        run: |

          if [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            echo "This is the SukiSU variant"
            git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git KernelSU
          elif [ "${{ inputs.kernelsu_variant }}" == "ReSukiSU" ]; then
            echo "This is the ReSukiSU variant"
            git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU
          elif [ "${{ inputs.kernelsu_variant }}" == "Official" ]; then
            echo "This is the Official"
            git clone https://github.com/tiann/KernelSU.git KernelSU
          else
            echo "Unknown variant"
            exit 1
          fi

          VAR=$([[ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]] && echo 700 || echo 200)

          cd KernelSU
          # 如果是 commit SHA，则直接 fetch 该 commit
          if [[ "$BRANCH" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Detected commit SHA, fetching it..."
              git fetch origin "$BRANCH" --depth=1
              git checkout "$BRANCH"
          else
              # 普通分支或 tag
              git checkout "$BRANCH" || git checkout -b "$BRANCH" "origin/$BRANCH" 
          fi

          # 计算KSU版本号
          KSU_GIT_VERSION=$(git rev-list --count HEAD)

          if [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            KSU_VERSION=$((40000 + KSU_GIT_VERSION - 2815))
          elif [ "${{ inputs.kernelsu_variant }}" == "ReSukiSU" ]; then
            KSU_VERSION=$((30700 + KSU_GIT_VERSION))
          elif [ "${{ inputs.kernelsu_variant }}" == "Official" ]; then
            KSU_VERSION=$((30000 + KSU_GIT_VERSION))
          fi
          echo $KSU_VERSION
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

          # 计算SUSFS版本号
          INFO="https://gitlab.com/simonpunk/susfs4ksu/-/raw/gki-android14-6.1/ksu_module_susfs/module.prop\?ref_type\=heads"
          SUS_VERSION=$(curl -s $INFO | awk -F '=' '$1 == "version" { print $2 }')
          echo $SUS_VERSION

          # 导出这两个值给release
          echo "kversion=$KSU_VERSION" >> $GITHUB_OUTPUT
          echo "sversion=$SUS_VERSION" >> $GITHUB_OUTPUT

      - name: 添加 KernelSU
        id: add_KSU
        continue-on-error: true
        run: |
          set -euo pipefail

          resolve_ref_to_sha() {
          local repo="$1"
          local ref="$2"
          local sha=""

          # 尝试当作 branch
          sha="$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${repo}/branches/${ref}" \
            | jq -r '.commit.sha // empty')"
          if [ -n "$sha" ]; then
            echo "$sha"
            return
          fi
          echo "::error::无法解析 $ref 为 SHA"
          exit 1
          }

          download_tag_release_apk() {
            local repo="$1"
            local tag="$2"
            local variant="$3"
            local release_json apk_name apk_url
            echo "从 $repo releases/${tag} 获取 $variant Manager APK..."
            release_json="$(curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/releases/tags/${tag}")"
            apk_name="$(echo "$release_json" | jq -r '
              (.assets | map(select(((.name | ascii_downcase) | endswith(".apk")) and ((.name | ascii_downcase) | contains("release")))) | .[0].name // empty) as $release_apk |
              if $release_apk != "" then $release_apk
              else (.assets | map(select((.name | ascii_downcase) | endswith(".apk"))) | .[0].name // empty)
              end
            ')"
            apk_url="$(echo "$release_json" | jq -r --arg name "$apk_name" '.assets[] | select(.name == $name) | .browser_download_url')"
            if [ -z "$apk_name" ] || [ -z "$apk_url" ]; then
              echo "::error::${repo} ${tag} release 中未找到 APK 资源"
              echo "$release_json" | jq -r '.assets[]?.name'
              exit 1
            fi
            mkdir -p "manager-artifacts/${variant}"
            echo "下载 $apk_name"
            curl -fL -o "manager-artifacts/${variant}/${apk_name}" "$apk_url"
            }

          download_manager_by_sha() {
          local repo="$1"
          local sha="$2" 
          local variant="$3"

          echo "→ 查询 workflow runs (head_sha=$sha)..."
          run_json="$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${repo}/actions/workflows/build-manager.yml/runs?head_sha=${sha}&status=success&per_page=1")"

          run_id="$(echo "$run_json" | jq -r '.workflow_runs[0].id // empty')"
          # 如果指定 SHA 找不到run_id，尝试最新成功构建
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::warning::未找到指定 SHA 的 run，尝试最新成功构建..."
            echo "尝试从nightly.link获取"
              mkdir -p "manager-artifacts/${variant}"
              if ! curl -fL -o "manager.zip" \
                "https://nightly.link/${repo}/workflows/build-manager/main/Manager-release.zip" 2>/dev/null; then
                if ! curl -fL -o "manager.zip" \
                "https://nightly.link/${repo}/workflows/build-manager/main/manager.zip" 2>/dev/null; then
                   echo "::error::nightly.link 下载失败，尝试 GitHub API fallback"
                   run_json="$(curl -fsSL \
                    -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                    "https://api.github.com/repos/${repo}/actions/workflows/build-manager.yml/runs?status=success&branch=main&per_page=1")"
                   run_id="$(echo "$run_json" | jq -r '.workflow_runs[0].id // empty')"
                fi
              fi
            if [ -f "manager.zip" ]; then
              unzip -o "manager.zip" -d "manager-artifacts/${variant}"
              rm -f "manager.zip"
            fi
          fi

          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            echo "找到工作流地址：https://github.com/${repo}/actions/runs/${run_id}"
            # 获取 artifacts 列表
            artifacts_json="$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${repo}/actions/runs/${run_id}/artifacts")"
            # 找 Manager.zip
            artifact_url="$(echo "$artifacts_json" | jq -r '
              .artifacts[] 
              | select(
                  # Official & SukiSU
                  (.name == "manager")
                  or
                  # ReSukiSU
                  (.name) == "Manager-release")
              | .archive_download_url
            ')"
            if [ -z "$artifact_url" ] || [ "$artifact_url" = "null" ]; then
              echo "::error::找不到 Manager artifact"
              exit 1
            fi

            mkdir -p "manager-artifacts/${variant}"

            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -o "manager-artifacts/${variant}/manager.zip" \
              "$artifact_url"

            unzip -o "manager-artifacts/${variant}/manager.zip" -d "manager-artifacts/${variant}"
            rm "manager-artifacts/${variant}/manager.zip"
          fi
          }

          case "${{ inputs.kernelsu_variant }}" in
            "Official")
              if [[ "$BRANCH" =~ ^[Vv]?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                download_tag_release_apk "tiann/KernelSU" "$BRANCH" "Official"
              else
                if ! [[ "$BRANCH" =~ ^[A-Fa-f0-9]{40}$ ]]; then
                  BRANCH="$(resolve_ref_to_sha "tiann/KernelSU" "$BRANCH")"
                fi
                download_manager_by_sha "tiann/KernelSU" "$BRANCH" "Official"
              fi
              ;;
            "SukiSU")
              if [[ "$BRANCH" =~ ^[Vv]?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                download_tag_release_apk "SukiSU-Ultra/SukiSU-Ultra" "$BRANCH" "SukiSU"
              else
                if ! [[ "$BRANCH" =~ ^[A-Fa-f0-9]{40}$ ]]; then
                  BRANCH="$(resolve_ref_to_sha "SukiSU-Ultra/SukiSU-Ultra" "$BRANCH")"
                fi
                download_manager_by_sha "SukiSU-Ultra/SukiSU-Ultra" "$BRANCH" "SukiSU"
              fi
              ;;
            "ReSukiSU")
              if [[ "$BRANCH" =~ ^[Vv]?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                # ReSukiSU无release
                # download_tag_release_apk "ReSukiSU/ReSukiSU" "$BRANCH" "ReSukiSU"
                download_manager_by_sha "ReSukiSU/ReSukiSU" "114514" "ReSukiSU"
              else
                if ! [[ "$BRANCH" =~ ^[A-Fa-f0-9]{40}$ ]]; then
                  BRANCH="$(resolve_ref_to_sha "ReSukiSU/ReSukiSU" "$BRANCH")"
                fi
                download_manager_by_sha "ReSukiSU/ReSukiSU" "$BRANCH" "ReSukiSU"
              fi
              ;;
            *)
              echo "::error::未知 KernelSU 变体: ${{ inputs.kernelsu_variant }}"
              exit 1
              ;;
          esac

          if ! find manager-artifacts -type f -name '*.apk' -print -quit | grep -q .; then
            echo "::error::未下载到任何 Manager APK"
            find manager-artifacts -maxdepth 3 -type f -print || true
            exit 1
          fi

      - name: 添加 SUSFS 模块
        id: add_SUSFS
        continue-on-error: true
        run: |
          BUILD_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/workflows/build.yml/runs?status=success" |
          jq -r '.workflow_runs[0].id')

          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$BUILD_ID/artifacts")

          DOWNLOAD_URL=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].archive_download_url') 

          NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].name')
          echo "SUSFS_NAME=$NAME" >> $GITHUB_ENV
          NAME="susfs-$NAME.zip"
          
          echo $DOWNLOAD_URL
          echo $NAME
          # 下载 Manager 文件
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "$NAME" "$DOWNLOAD_URL"
          echo "$NAME 文件已下载.zip"
          
          
          # 解压 artifact zip 获取里面的模块文件
          mkdir -p susfs-module
          unzip "$NAME" -d susfs-temp

          # 检查解压后的内容：如果是散装文件则打包成 zip
          cd susfs-temp
          if ls *.zip 1>/dev/null 2>&1; then
            # 里面已经是 zip 文件，直接移动
            mv *.zip ../susfs-module/
          else
            # 是散装文件，打包成 zip
            zip -r "../susfs-module/ksu_module_susfs.zip" .
          fi
          cd ..
          rm -rf susfs-temp "$NAME"

      - name: Notify on failure
        if: steps.add_KSU.outcome == 'failure'
        run: echo "下载CI构建的KSU失败!"

      - name: 上传APK
        if: steps.add_KSU.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.kernelsu_variant }}-Manager(${{ env.KSU_VERSION }})
          path: |
            **/*.apk

      - name: 上传SUSFS模块
        if: steps.add_SUSFS.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: susfs-${{ env.SUSFS_NAME }}
          path: ./susfs-module/*
      
  upload_other_modules:
    if: ${{ inputs.use_ntsync || inputs.use_networking }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: 合并启用功能的模块
        run: |
          echo "=== 开始合并扩展模块 ==="
          ls -la modules/ || echo "modules 目录不存在"

          ENABLE_FEATURES=()
          if [ "${{ inputs.use_networking }}" = "true" ]; then
            ENABLE_FEATURES+=("ipset")
          fi
          if [ "${{ inputs.use_ntsync }}" = "true" ]; then
            ENABLE_FEATURES+=("ntsync")
          fi
          
          echo "当前启用功能: ${ENABLE_FEATURES[*]}"

          PROP="modules/main/module.prop"      
          cat > "$PROP" << EOF
          id=abk_extension
          name=ABK-Extension
          version=1.2.0
          versionCode=10020
          EOF

          AUTHORS=""
          DESC=""
          for feature in "${ENABLE_FEATURES[@]}"; do
            if [ -f "modules/$feature/module.prop" ]; then
              A=$(grep '^author=' "modules/$feature/module.prop" | cut -d'=' -f2- | sed 's/^[[:space:]]*//')
              D=$(grep '^description=' "modules/$feature/module.prop" | cut -d'=' -f2- | sed 's/^[[:space:]]*//')
              [ -n "$A" ] && AUTHORS="${AUTHORS}${A}, "
              [ -n "$D" ] && DESC="${DESC}${D}; "
            fi
          done
          
          [ -n "$AUTHORS" ] && echo "author=${AUTHORS%, }" >> "$PROP"
          [ -n "$DESC" ]    && echo "description=${DESC%; }" >> "$PROP"
          
          echo "module.prop 合并完成"

          for feature in "${ENABLE_FEATURES[@]}"; do
            [ -d "modules/$feature" ] || continue
            echo "正在合并模块: $feature"
            
            find "modules/$feature" -type f ! -name "module.prop" | while read -r src; do
              rel="${src#modules/$feature/}"
              dst="modules/main/$rel"
              
              mkdir -p "$(dirname "$dst")"
              
              if [ ! -f "$dst" ]; then
                cp -a "$src" "$dst"
                echo "  复制: $feature/$rel"
              else
                echo "  追加: $feature/$rel"
                echo "" >> "$dst"
                echo "# ========== 来自 $feature ==========" >> "$dst"
                cat "$src" >> "$dst"
              fi
            done
          done

          echo "=== 合并完成 ==="
          echo "最终 modules/main 内容："
          ls -R modules/main/

      - name: 上传扩展模块
        uses: actions/upload-artifact@v6
        with:
          name: abk_extension
          path: modules/main/*
          if-no-files-found: error
